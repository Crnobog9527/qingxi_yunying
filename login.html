<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访问清熙小院运营工作台</title>
    <style>
      :root {
        --paper: #f7f2e8;
        --ink: #2f302a;
        --muted: #746e60;
        --line: #e4d8c3;
        --bamboo: #526d4a;
        --danger: #a95441;
        --white: #fffdf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: linear-gradient(180deg, #f9f4ea 0%, #efe4d2 100%);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }
      main {
        width: min(440px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        background: rgba(255, 253, 248, 0.94);
        box-shadow: 0 16px 40px rgba(66, 50, 26, 0.12);
      }
      .eyebrow {
        margin: 0 0 8px;
        color: var(--bamboo);
        font-size: 13px;
        font-weight: 700;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.18;
      }
      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }
      form {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }
      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }
      input, button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 12px;
        color: var(--ink);
        background: var(--white);
      }
      button {
        border: 1px solid var(--bamboo);
        color: #fffdf8;
        background: var(--bamboo);
        cursor: pointer;
      }
      .error {
        min-height: 22px;
        color: var(--danger);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">清熙小院 · 内部运营工作台</p>
      <h1>请输入访问密码</h1>
      <p>密码通过后会进入工作台，数据会自动从线上读取并自动保存。</p>
      <form id="login-form">
        <label>
          访问密码
          <input id="password" type="password" autocomplete="current-password" autofocus />
        </label>
        <button type="submit">进入工作台</button>
        <div class="error" id="error"></div>
      </form>
    </main>
    <script>
      const form = document.getElementById("login-form");
      const password = document.getElementById("password");
      const error = document.getElementById("error");
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "/";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        try {
          const response = await fetch("/api/auth-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: password.value }),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) throw new Error(result.message || "密码验证失败。");
          window.location.href = next;
        } catch (loginError) {
          error.textContent = loginError.message || "密码验证失败。";
        }
      });
    </script>
  </body>
</html>
